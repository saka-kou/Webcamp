<!DOCTYPE html>
<html lang="jp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/ress.css">
    <link rel="stylesheet" href="css/color.css">
    <link rel="stylesheet" href="css/input-page.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Kaisei+Opti&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Noto+Sans+JP:wght@300&family=Noto+Serif+JP:wght@200&family=Rampart+One&family=Rubik+80s+Fade&family=Sawarabi+Mincho&display=swap"
        rel="stylesheet">
    <script defer src="js/input-page.js"></script>
</head>

<body>
    <header class="header">
        <h1>じぶんのプロフィールをつくろー！</h1>
        <span id="progressWrap">
            <span id="progress">
                <span id="star"><img src="images/star.png" alt="星"></span>
            </span>
        </span>
    </header>
    <main class="main">
        <p class="title">にっくねーむ</p>
        <input name="name" class="input" type="text">
        <p class="title">SNSのID</p>
        <input name="sns" class="input" type="text">
        <p class="title">たんじょうび</p>
        <div class="birthday">
            <input name="month" class="input" type="number">
            <p class="title">月</p>
            <input name="day" class="input" type="number">
            <p class="title">日</p>
        </div>
        <p class="title">けつえきがた</p>
        <div class="blood">
            <input name="blood" class="input" type="text">
            <p class="title">型</p>
        </div>
        <p class="title">せいざ</p>
        <div class="constellation">
            <input name="constellation" class="input" type="text">
            <p class="title">座</p>
        </div>
        <p class="title">MBTI</p>
        <input name="mbti" class="input" type="text">
        <p class="title">推し♥</p>
        <input name="favorite" class="input" type="text">
        <p class="title">最近ハマってること</p>
        <input name="like" class="input" type="text">
        <p class="title">せいかく</p>
        <input name="character" class="input" type="text">
        <p class="title">趣味</p>
        <input name="hobby" class="input" type="text">
        <p class="title">特技</p>
        <input name="skill" class="input" type="text">
    </main>
    <footer class="footer">
        <a href="input-page2.html"><img src="images/footerui.png" alt="つぎへボタン" id="nextBtn"></a>
    </footer>
</body>

</html>
